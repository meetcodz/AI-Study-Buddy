<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Coach AI Chatbox</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #6c8fff;
    --accent2: #a78bfa;
    --accent-glow: rgba(108,143,255,0.18);
    --text: #e8ecf4;
    --text-muted: #6b7394;
    --user-bubble: #1e2540;
    --ai-bubble: #161924;
    --radius: 18px;
    --font: 'Sora', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── Chat Widget ── */
  .chat-widget {
    width: 420px;
    height: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(108,143,255,0.06);
    position: relative;
    animation: rise 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* subtle gradient top edge */
  .chat-widget::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    z-index: 10;
  }

  /* ── Header ── */
  .chat-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .header-info { flex: 1; }
  .header-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    letter-spacing: 0.01em;
  }
  .header-status {
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .header-actions { display: flex; gap: 6px; }
  .hbtn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .hbtn:hover { background: var(--surface2); color: var(--text); }

  /* ── Messages ── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* date divider */
  .date-divider {
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%; width: 28%; height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after  { right: 0; }

  /* message row */
  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    animation: msg-in 0.3s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .msg-row.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg-row.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(108,143,255,0.2);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .bubble .meta {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-top: 5px;
  }

  /* tags inside AI bubble */
  .tag {
    display: inline-block;
    font-size: 10px;
    font-family: var(--mono);
    background: rgba(108,143,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(108,143,255,0.2);
    padding: 2px 7px;
    border-radius: 99px;
    margin-bottom: 6px;
  }

  /* quick suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 12px;
    flex-shrink: 0;
  }
  .suggest-btn {
    font-family: var(--font);
    font-size: 11.5px;
    color: var(--accent);
    background: rgba(108,143,255,0.07);
    border: 1px solid rgba(108,143,255,0.18);
    border-radius: 99px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .suggest-btn:hover {
    background: rgba(108,143,255,0.15);
    border-color: rgba(108,143,255,0.4);
    color: #fff;
  }

  /* ── Input bar ── */
  .chat-input-bar {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within {
    border-color: rgba(108,143,255,0.4);
    box-shadow: 0 0 0 3px rgba(108,143,255,0.07);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 13.5px;
    line-height: 1.5;
    resize: none;
    max-height: 100px;
    min-height: 20px;
    height: 20px;
  }
  textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    transition: all 0.15s;
    box-shadow: 0 4px 14px rgba(108,143,255,0.3);
  }
  .send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(108,143,255,0.45); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── API Key Banner ── */
  .api-banner {
    background: rgba(108,143,255,0.07);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .api-banner input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-banner input:focus { border-color: var(--accent); }
  .api-banner input::placeholder { color: var(--text-muted); }
  .api-banner label {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: var(--mono);
  }
  .api-save-btn {
    font-family: var(--font);
    font-size: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 5px 10px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .api-save-btn:hover { opacity: 0.85; }
  .api-status {
    font-size: 10px;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .api-status.ok  { color: #4ade80; }
  .api-status.err { color: #f87171; }

  /* ── Typing indicator ── */
  .typing-row { display: flex; gap: 8px; align-items: flex-end; }
  .typing-bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 10px 16px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing-bubble span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
</style>
</head>
<body>

<div class="chat-widget" id="chatWidget">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🎓</div>
    <div class="header-info">
      <div class="header-name">StudyCoach AI</div>
      <div class="header-status">
        <span class="status-dot"></span>
        Online · Ready to help you learn
      </div>
    </div>
    <div class="header-actions">
      <button class="hbtn" title="Clear chat" onclick="clearChat()">🗑</button>
    </div>
  </div>

  <!-- API Key Banner -->
  <div class="api-banner" id="apiBanner">
    <label>🔑 Gemini Key:</label>
    <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key here…"/>
    <button class="api-save-btn" onclick="saveKey()">Save</button>
    <span class="api-status" id="apiStatus"></span>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages">
    <div class="date-divider">Today</div>

    <div class="msg-row ai">
      <div class="msg-avatar">🎓</div>
      <div class="bubble">
        <div><span class="tag">Study Coach</span></div>
        Hey! I'm your AI Study Coach 👋<br/>
        I can help you with <strong>explaining concepts</strong>, <strong>quiz prep</strong>, <strong>summarising notes</strong>, and more.<br/>
        What are you studying today?
        <div class="meta">Just now</div>
      </div>
    </div>
  </div>

  <!-- Quick suggestions -->
  <div class="suggestions" id="suggestions">
    <button class="suggest-btn" onclick="sendSuggestion(this)">📖 Explain a concept</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">🧠 Quiz me</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">📝 Summarise notes</button>
    <button class="suggest-btn" onclick="sendSuggestion(this)">📅 Study plan</button>
  </div>

  <!-- Input bar -->
  <div class="chat-input-bar">
    <div class="input-wrap">
      <textarea
        id="userInput"
        placeholder="Ask anything about your studies…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are StudyCoach AI — a friendly, encouraging, and highly knowledgeable study assistant for students. Your role is to:
- Explain concepts clearly and simply, using analogies and examples
- Help students prepare for exams with quizzes and practice questions
- Summarise notes or topics concisely
- Create personalised study plans
- Motivate and support students
Keep responses concise (2-5 sentences or bullet points when needed), warm, and educational. Use emojis sparingly to make responses feel friendly. Always end with a follow-up question or encouragement to keep the student engaged.`;

let history = [];   // stores { role, parts: [{text}] } for Gemini format
let isLoading = false;
let GEMINI_API_KEY = localStorage.getItem('gemini_api_key') || '';

// Restore saved key on load
window.addEventListener('DOMContentLoaded', () => {
  if (GEMINI_API_KEY) {
    document.getElementById('apiKeyInput').value = GEMINI_API_KEY;
    document.getElementById('apiStatus').textContent = '✓ Key loaded';
    document.getElementById('apiStatus').className = 'api-status ok';
  }
});

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) {
    document.getElementById('apiStatus').textContent = '✗ Empty!';
    document.getElementById('apiStatus').className = 'api-status err';
    return;
  }
  GEMINI_API_KEY = val;
  localStorage.setItem('gemini_api_key', val);
  document.getElementById('apiStatus').textContent = '✓ Saved!';
  document.getElementById('apiStatus').className = 'api-status ok';
}

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function autoResize(el) {
  el.style.height = '20px';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function appendMessage(role, text) {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'ai' ? '🎓' : '🧑';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'ai') {
    bubble.innerHTML = `<span class="tag">Study Coach</span><br/>${text.replace(/\n/g, '<br/>')}`;
  } else {
    bubble.textContent = text;
  }

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = getTime();
  bubble.appendChild(meta);

  row.appendChild(avatarEl);
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingIndicator';

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = '🎓';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(avatarEl);
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

async function sendMessage(text) {
  const input = document.getElementById('userInput');
  const msg = (text || input.value).trim();
  if (!msg || isLoading) return;

  if (!GEMINI_API_KEY) {
    appendMessage('ai', '⚠️ Please paste your Gemini API key in the field above and click Save first!');
    return;
  }

  hideSuggestions();
  input.value = '';
  autoResize(input);
  appendMessage('user', msg);

  // Gemini format: role is 'user' or 'model', content is parts: [{text}]
  history.push({ role: 'user', parts: [{ text: msg }] });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: history
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      const errMsg = data.error.message || 'API error';
      appendMessage('ai', `❌ Gemini Error: ${errMsg}`);
      history.pop(); // remove last user message on error
    } else {
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I had trouble responding. Please try again.';
      appendMessage('ai', reply);
      // Gemini returns role as 'model'
      history.push({ role: 'model', parts: [{ text: reply }] });
    }

  } catch (err) {
    removeTyping();
    appendMessage('ai', '🔌 Network error — please check your connection and try again.');
    history.pop();
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function sendSuggestion(btn) {
  const label = btn.textContent.replace(/^[^\s]+\s/, '');
  sendMessage(label);
}

function clearChat() {
  history = [];
  const container = document.getElementById('messages');
  container.innerHTML = `
    <div class="date-divider">Today</div>
    <div class="msg-row ai" style="animation: msg-in 0.3s both">
      <div class="msg-avatar">🎓</div>
      <div class="bubble">
        <span class="tag">Study Coach</span><br/>
        Chat cleared! Ready to help you again. What would you like to learn? 😊
        <div class="meta">${getTime()}</div>
      </div>
    </div>`;
  document.getElementById('suggestions').style.display = 'flex';
}
</script>
</body>
</html>
