<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - AI Study Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar or Header Space if needed, keeping it simple for now -->
        
        <main class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <h1>Nexus</h1>
                    <p>Your AI Study Assistant</p>
                </div>
                <div class="status-indicator">
                    <span class="dot online"></span>
                    <span class="status-text">Online</span>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Message -->
                <div class="message bot-message">
                    <div class="avatar">N</div>
                    <div class="message-content">
                        Hi there! I'm Nexus, your dedicated study assistant. How can I help you learn today?
                    </div>
                </div>
            </div>

            <div class="typing-indicator hidden" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>

            <footer class="chat-input-area">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Ask a study question... (e.g., Explain mitosis)" autocomplete="off">
                    <button type="submit" id="send-button">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
