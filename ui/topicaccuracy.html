<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Accuracy Trend — StudyFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: #0A0C12; color: #F0F2F5; font-family: 'Outfit', sans-serif; 
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}
.mono { font-family: 'JetBrains Mono', monospace; }


.header {
  position: fixed; top: 0; left: 0; right: 0; height: 70px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 32px; z-index: 1000; flex-shrink: 0;
  background: linear-gradient(to bottom, rgba(10,12,18,0.8), transparent);
  backdrop-filter: blur(8px);
}
.back-btn {
  display: flex; align-items: center; gap: 8px; color: #8892A4; text-decoration: none; 
  font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s;
}
.back-btn:hover { color: #F0F2F5; }
.back-btn svg { width: 16px; height: 16px; }

.header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
.score-badge {
  background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.25);
  padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; color: #8B5CF6;
  display: flex; align-items: center; gap: 6px;
}


.main-area {
  display: grid; grid-template-columns: 280px 1fr 340px; flex: 1; height: 100vh; padding-top: 70px;
}


.left-panel {
  border-right: 1px solid rgba(59,130,246,0.1); background: #0D1118; padding: 28px 20px;
  display: flex; flex-direction: column; gap:20px; overflow-y: auto;
}
.left-panel::-webkit-scrollbar { width: 4px; }
.left-panel::-webkit-scrollbar-thumb { background: #1E2535; border-radius: 2px; }

.nav-group-title { font-size: 10px; font-weight: 700; color: #4B5563; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 12px; }

.subj-btn {
  display: flex; align-items: center; justify-content: space-between; width: 100%; border: none; background: transparent;
  padding: 12px 16px; border-radius: 12px; cursor: pointer; color: #8892A4; transition: all 0.2s;
}
.subj-btn:hover { background: rgba(255,255,255,0.03); }
.subj-btn-left { display: flex; align-items: center; gap: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; }
.subj-btn svg { width:18px; height:18px; }
.subj-btn.active { background: #161D2C; }


#topic-list { margin-top: 20px; }
.tpc-btn {
  display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: transparent;
  padding: 10px 16px; border-radius: 10px; cursor: pointer; color: #8892A4; transition: 0.2s;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
}
.tpc-btn:hover { background: rgba(255,255,255,0.02); color: #F0F2F5; }
.tpc-btn.active { background: rgba(59,130,246,0.1); color: #3B82F6; }


.center-panel {
  position: relative; display: flex; flex-direction: column; padding: 40px; justify-content: center;
  background: radial-gradient(circle at 60% 40%, rgba(139,92,246,0.04) 0%, transparent 60%);
}
.chart-wrapper {
  width: 100%; max-width: 900px; height: 100%; max-height: 500px; margin: 0 auto;
}


.right-panel {
  border-left: 1px solid rgba(59,130,246,0.1); background: #0D1118; padding: 28px 24px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 24px;
}
.dt-card { background: #111824; border: 1px solid rgba(59,130,246,0.1); border-radius: 16px; padding: 20px; }
.dt-card-lbl { font-size: 11px; font-weight: 700; color: #8892A4; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }

.dt-pretitle { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; color: #3B82F6;}
.dt-title { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; color: #F0F2F5; margin-bottom: 24px;}

.score-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px;}
.score-val { font-size: 42px; font-weight: 700; color: #F0F2F5; line-height: 1;}
.score-sub { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 8px;}
.score-up { color: #10B981; background: rgba(16,185,129,0.1); }
.score-down { color: #F43F5E; background: rgba(244,63,94,0.1); }

.prog-bg { height: 6px; background: #1A2035; border-radius: 3px; overflow: hidden; margin-bottom: 24px;}
.prog-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 1s cubic-bezier(0.22,1,0.36,1); }

.btn {
  padding: 12px 16px; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; width:100%;
  font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; display: flex; align-items: center; justify-content:center; gap: 8px; margin-bottom:12px;
}
.btn-primary { background: #14B8A6; color: #0A0C12; }
.btn-primary:hover { background: #0D9488; }
.btn-secondary { background: #1E2535; color: #F0F2F5; }
.btn-secondary:hover { background: #2A344A; }

</style>
</head>
<body>

<header class="header">
  <div style="display:flex; align-items:center; gap:24px;">
    <a href="finaldash.html" class="back-btn"><i data-lucide="arrow-left"></i> Back to Dashboard</a>
    <div style="width:1px; height:24px; background:#1E2D44;"></div>
    <div class="header-title">Accuracy Trends Center</div>
  </div>
  <div class="header-right">
    <div class="score-badge"><i data-lucide="line-chart" style="width:14px;height:14px;"></i> Trend Visualizer</div>
  </div>
</header>

<div class="main-area">


  <aside class="left-panel">
    <div>
      <div class="nav-group-title">Subjects</div>
      <button class="subj-btn active" data-subject="math">
        <div class="subj-btn-left"><i data-lucide="function-square"></i> Mathematics</div>
      </button>
      <button class="subj-btn" data-subject="physics">
        <div class="subj-btn-left"><i data-lucide="atom"></i> Physics</div>
      </button>
      <button class="subj-btn" data-subject="chem">
        <div class="subj-btn-left"><i data-lucide="beaker"></i> Chemistry</div>
      </button>
    </div>

    <div id="topic-list">
      <div class="nav-group-title">Topics</div>
      <div id="topic-container"></div>
    </div>
  </aside>

 
  <main class="center-panel">
    <div class="chart-wrapper">
      <canvas id="lineChart"></canvas>
    </div>
    <div style="text-align:center; margin-top:20px; font-size:13px; color:#8892A4; display:flex; align-items:center; justify-content:center; gap:6px;">
      <i data-lucide="mouse-pointer-click" style="width:14px;height:14px;"></i> Click any point on the graph to view specific day insights
    </div>
  </main>


  <aside class="right-panel">
    <div id="detail-container">
      <div class="dt-pretitle" id="dt-subject-lbl">Mathematics</div>
      <div class="dt-title" id="dt-topic-name">Algebra</div>

      <div class="dt-card">
        <div class="dt-card-lbl" id="dt-mode-lbl">Current Trajectory</div>
        <div class="score-row">
          <div class="score-val mono" id="dt-score-val">81%</div>
          <div class="score-sub score-up" id="dt-score-trend">↑ +4%</div>
        </div>
        <div class="prog-bg">
          <div class="prog-fill" id="dt-score-bar" style="width:0%; background:#14B8A6;"></div>
        </div>
      </div>

      <div class="dt-card">
        <div class="dt-card-lbl">Summary Stats</div>
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
          <span style="font-size:13px; color:#8892A4;">Highest Peak</span>
          <span class="mono" style="font-weight:700; color:#F0F2F5;" id="st-best">85%</span>
        </div>
        <div style="display:flex; justify-content:space-between;">
          <span style="font-size:13px; color:#8892A4;">Average Accuracy</span>
          <span class="mono" style="font-weight:700; color:#F0F2F5;" id="st-avg">72%</span>
        </div>
      </div>

      <div style="margin-top:auto;">
        <button class="btn btn-primary"><i data-lucide="target"></i> Focus Practice</button>
        <button class="btn btn-secondary"><i data-lucide="file-text"></i> View Topic Notes</button>
      </div>
    </div>
  </aside>

</div>

<script>
lucide.createIcons();

const DB = {
  math:{
    color: '#3B82F6', name: 'Mathematics',
    topics: {
      Algebra:[60,65,70,68,72,78,81],
      Probability:[30,35,40,38,42,45,50],
      Calculus:[50,55,58,60,62,64,66]
    }
  },
  physics:{
    color: '#8B5CF6', name: 'Physics',
    topics: {
      Kinematics:[55,58,60,62,64,66,68],
      Thermodynamics:[30,35,40,42,43,44,45],
      Optics:[45,48,50,52,55,57,60]
    }
  },
  chem:{
    color: '#EC4899', name: 'Chemistry',
    topics: {
      Organic:[60,62,65,68,70,73,75],
      Physical:[50,52,54,56,58,60,62],
      Inorganic:[40,42,44,46,48,50,52]
    }
  }
};

let currentSubject = "math";
let currentTopic = "Algebra";
let chartInstance = null;

Chart.defaults.color = '#8892A4';
Chart.defaults.font.family = "'Outfit', sans-serif";

function loadNavigation() {

  const tpcContainer = document.getElementById('topic-container');
  tpcContainer.innerHTML = '';
  const obj = DB[currentSubject];
  const tKeys = Object.keys(obj.topics);
  tKeys.forEach((t, i) => {
    if(i===0 && currentTopic && Object.keys(obj.topics).indexOf(currentTopic) === -1) currentTopic = t;
    const btn = document.createElement('button');
    btn.className = `tpc-btn ${currentTopic === t ? 'active' : ''}`;
    btn.innerHTML = `<i data-lucide="chevron-right" style="width:14px;height:14px; opacity:0.5;"></i> ${t}`;
    btn.onclick = () => {
      currentTopic = t;
      document.querySelectorAll('.tpc-btn').forEach(b=>{b.classList.remove('active'); b.style.color='#8892A4'; b.style.background='transparent';});
      btn.classList.add('active');
      btn.style.color = obj.color;
      btn.style.background = `rgba(${hexToRgb(obj.color)},0.1)`;
      renderChart();
    };
    tpcContainer.appendChild(btn);
  });
  lucide.createIcons();
}

function hexToRgb(hex) {
  let r = 0, g = 0, b = 0;
  if(hex==='#3B82F6'){r=59;g=130;b=246;}
  else if(hex==='#8B5CF6'){r=139;g=92;b=246;}
  else if(hex==='#EC4899'){r=236;g=72;b=153;}
  return `${r},${g},${b}`;
}

function renderChart() {
  const dataArr = DB[currentSubject].topics[currentTopic];
  const col = DB[currentSubject].color;
  const rgb = hexToRgb(col);

  document.getElementById('dt-subject-lbl').textContent = DB[currentSubject].name;
  document.getElementById('dt-subject-lbl').style.color = col;
  document.getElementById('dt-topic-name').textContent = currentTopic;
  

  const ctx = document.getElementById("lineChart").getContext("2d");
  let gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, `rgba(${rgb}, 0.25)`);
  gradient.addColorStop(1, `rgba(${rgb}, 0.0)`);

  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5", "Day 6", "Day 7"],
      datasets: [{
        label: 'Accuracy %',
        data: dataArr,
        borderColor: col,
        borderWidth: 4,
        tension: 0.4,
        fill: true,
        backgroundColor: gradient,
        pointBackgroundColor: col,
        pointBorderColor: '#0A0C12',
        pointBorderWidth: 2,
        pointRadius: 6,
        pointHoverRadius: 9,
        pointHoverBackgroundColor: '#FFF',
        pointHoverBorderColor: col,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 1000, easing: 'easeOutQuart' },
      layout: { padding: 20 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(13, 17, 24, 0.95)', titleColor: '#8892A4', bodyColor: '#F0F2F5',
          bodyFont: { size: 16, weight: 'bold', family: "'JetBrains Mono', monospace" },
          padding: 12, borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, displayColors: false,
          callbacks: { label: (ctx) => `${ctx.raw}% Accuracy` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892A4', font: {size: 13, weight:'500'} } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892A4' }, min: 0, max: 100 }
      },
      onClick: (event, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          updateRightPanel(idx);
        }
      }
    }
  });

  updateRightPanel(dataArr.length - 1);
}

function updateRightPanel(idx) {
  const dataArr = DB[currentSubject].topics[currentTopic];
  const col = DB[currentSubject].color;
  const score = dataArr[idx];
  let trend = 0;
  if(idx > 0) trend = score - dataArr[idx-1];

  document.getElementById('dt-mode-lbl').textContent = idx === dataArr.length - 1 ? 'Current Trajectory' : `Insight for Day ${idx+1}`;
  document.getElementById('dt-score-val').textContent = score + '%';
  
  const tr = document.getElementById('dt-score-trend');
  if(trend >= 0) {
    tr.textContent = `↑ +${trend}%`;
    tr.className = 'score-sub score-up';
  } else {
    tr.textContent = `↓ ${trend}%`;
    tr.className = 'score-sub score-down';
  }

  const pFill = document.getElementById('dt-score-bar');
  pFill.style.width = '0%';
  setTimeout(() => {
    pFill.style.width = score + '%';
    pFill.style.background = col;
  }, 50);

  const best = Math.max(...dataArr);
  const avg = Math.round(dataArr.reduce((a,b)=>a+b)/dataArr.length);
  document.getElementById('st-best').textContent = best + '%';
  document.getElementById('st-avg').textContent = avg + '%';
}


document.querySelectorAll('.subj-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.subj-btn').forEach(b => {
      b.classList.remove('active'); b.style.color = '#8892A4';
      const svg = b.querySelector('svg');
      if(svg) svg.style.color = '#8892A4';
    });
    btn.classList.add('active');
    const c = DB[btn.dataset.subject].color;
    btn.style.color = c;
    const svg = btn.querySelector('svg');
    if(svg) svg.style.color = c;
    currentSubject = btn.dataset.subject;
    currentTopic = Object.keys(DB[currentSubject].topics)[0]; 
    loadNavigation();
    renderChart();
  };
});


document.querySelector('.subj-btn[data-subject="math"]').style.color = DB.math.color;
let intSvg = document.querySelector('.subj-btn[data-subject="math"] svg');

if(intSvg) intSvg.style.color = DB.math.color;

loadNavigation();
renderChart();

</script>
</body>
</html>
