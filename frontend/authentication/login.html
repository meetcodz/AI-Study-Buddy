<!DOCTYPE html>
<html lang="en">
<head>
    <style>html{background-color:#0A0C12 !important;} @keyframes globalFadeIn{from{opacity:0}to{opacity:1}} body{animation:globalFadeIn 0.4s ease-out;}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudyFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0A0C12;
            color: #F0F2F5;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(15, 21, 32, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.02);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.98); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .header { text-align: center; }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(59, 130, 246, 0.1);
            color: #3B82F6;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 14px;
            color: #8892A4;
            font-weight: 400;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-label {
            font-size: 12px;
            font-weight: 600;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 4px;
        }
        .input-field {
            width: 100%;
            height: 48px;
            background: rgba(10, 12, 18, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 12px;
            padding: 0 16px;
            color: #F0F2F5;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
            outline: none;
        }
        .input-field:focus {
            background: rgba(10, 12, 18, 0.9);
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .input-field::placeholder { color: #4B5563; }

        .btn-submit {
            width: 100%;
            height: 48px;
            background: #3B82F6;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover {
            background: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.25);
        }
        .btn-submit:active { transform: translateY(0); }

        .btn-google {
            width: 100%;
            height: 48px;
            background: rgba(255, 255, 255, 0.03);
            color: #F0F2F5;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn-google:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        .btn-google svg { width: 18px; height: 18px; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #4B5563;
            font-size: 12px;
            margin: -4px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }

        .btn-skip {
            width: 100%;
            height: 48px;
            background: transparent;
            color: #9CA3AF;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-skip:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #F0F2F5;
            border-color: rgba(148, 163, 184, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="header">
            <div class="logo-icon">
                <i data-lucide="book-open"></i>
            </div>
            <h1>Welcome to StudyFlow</h1>
            <p>Log in to sync your progress and goals</p>
        </div>

        <button type="button" class="btn-google" id="google-btn">
            <svg viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
        </button>

        <div class="divider">OR</div>

        <form id="login-form">
            <div class="input-group">
                <label class="input-label">Email</label>
                <input type="email" id="email" class="input-field" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="input-group" style="margin-top: 12px;">
                <label class="input-label">Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span>Sign In / Register</span>
                <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>
        </form>

        <div class="divider">OR</div>

        <button type="button" class="btn-skip" id="skip-btn">Skip for now</button>
    </div>

    <script type="module">
        import { loginWithGoogle, loginWithEmail, skipAuth } from './auth.js';
        
        lucide.createIcons();

        const btn = document.getElementById('submit-btn');
        const showLoader = (text) => {
            btn.innerHTML = `<svg style="animation: spin 1s linear infinite; width: 18px; height: 18px;" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="32" stroke-linecap="round" opacity="0.5"></circle></svg> <span>${text}</span>`;
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
        };

        // Google Sign-In
        document.getElementById('google-btn').addEventListener('click', async () => {
            try {
                await loginWithGoogle();
                localStorage.setItem('studyflow_mode', 'pro');
                localStorage.setItem('studyflow_auth', 'logged_in');
                window.location.href = '../finaldash.html';
            } catch(e) {
                alert("Google Sign-In Failed: " + e.message);
            }
        });

        // Email Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            showLoader('Authenticating...');

            try {
                const user = await loginWithEmail(email, pass);
                localStorage.setItem('studyflow_auth', 'logged_in');
                localStorage.setItem('studyflow_user', JSON.stringify({ email: user.email }));
                localStorage.setItem('studyflow_mode', 'pro');
                window.location.href = '../finaldash.html';
            } catch (error) {
                alert(error.message);
                btn.innerHTML = '<span>Sign In / Register</span> <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>';
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'all';
                lucide.createIcons();
            }
        });

        // Anonymous Skip
        document.getElementById('skip-btn').addEventListener('click', async () => {
            try {
                await skipAuth();
                localStorage.setItem('studyflow_auth', 'guest');
                localStorage.setItem('studyflow_mode', 'pro');
                window.location.href = '../finaldash.html';
            } catch(e) {
                window.location.href = '../finaldash.html';
            }
        });

        // Spin animation
        const style = document.createElement('style');
        style.innerHTML = '@keyframes spin { 100% { transform: rotate(360deg); } }';
        document.head.appendChild(style);
    </script>
    <script src="../js/global-bg.js"></script>
</body>
</html>
