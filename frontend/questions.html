<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow — Question Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/questions.css">
</head>
<body class="overflow-x-hidden min-h-screen pt-[70px]">
    
    <div class="top-nav">
      <div class="nav-left">
        <a href="finaldash.html" class="nav-btn" title="Back to Dashboard">

        </a>

      <div class="profile-btn">

    </div>

    <div id="hero" style="position:fixed; inset:0; z-index:-1; pointer-events:none;">
      
      
    </div>

    <script>lucide.createIcons();</script>

<script src="js/global-bg.js"></script>
